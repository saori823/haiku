<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Web投句箱</title>
    <style>
      /* 全体の基本設定（和の雰囲気） */
      body {
        font-family: "Noto Sans JP", sans-serif;
        background-color: #fcfaf2; /* 生成り（ベースの背景） */
        color: #333;
        margin: 0;
        padding: 20px;
        transition: background-color 0.8s ease; /* じんわり色が変わるアニメーション */
      }
      h1,
      h2 {
        font-family: "Noto Serif JP", serif; /* 見出しは明朝体 */
        color: #005e15; /* 基本の緑色 */
        border-bottom: 2px solid #005e15;
        padding-bottom: 10px;
      }
      /* ボタンやナビゲーション */
      button {
        font-family: "Noto Sans JP", sans-serif;
        background-color: #005e15;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        transition: opacity 0.3s;
      }
      button:hover {
        opacity: 0.8;
      }
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }
      ul {
        line-height: 1.8; /* 行間を広げて読みやすく */
      }
      li {
        margin-bottom: 10px;
      }

      /* ====== 季節ごとのテーマ設定 ====== */
      /* 春：桜のような淡いピンク */
      body.theme-spring {
        background-color: #fff0f5;
      }
      body.theme-spring h1,
      body.theme-spring h2 {
        color: #d783a1;
        border-color: #d783a1;
      }
      body.theme-spring button {
        background-color: #d783a1;
      }

      /* 夏：鮮やかな萌葱色 */
      body.theme-summer {
        background-color: #f0fff0;
      }
      body.theme-summer h1,
      body.theme-summer h2 {
        color: #228b22;
        border-color: #228b22;
      }
      body.theme-summer button {
        background-color: #228b22;
      }

      /* 秋：紅葉のような茜色 */
      body.theme-autumn {
        background-color: #fff5ee;
      }
      body.theme-autumn h1,
      body.theme-autumn h2 {
        color: #c3512f;
        border-color: #c3512f;
      }
      body.theme-autumn button {
        background-color: #c3512f;
      }

      /* 冬：凛とした雪のような青白さ */
      body.theme-winter {
        background-color: #f0f8ff;
      }
      body.theme-winter h1,
      body.theme-winter h2 {
        color: #4682b4;
        border-color: #4682b4;
      }
      body.theme-winter button {
        background-color: #4682b4;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav>
      <button id="nav-post">新しい句を投稿する</button>
      <button id="nav-list">投稿された俳句一覧を見る</button>
    </nav>
    <hr />

    <div id="page-post" class="page active">
      <h1>Web投句箱</h1>
      <ul id="error-messages" class="error-list"></ul>

      <p>
        題を選択してください
        <select id="theme">
          <option>旅</option>
          <option>自然</option>
          <option>家族</option>
          <option>音楽</option>
          <option>食べ物</option>
        </select>
      </p>
      <p>
        季節を選択してください
        <select id="season">
          <option>春</option>
          <option>夏</option>
          <option>秋</option>
          <option>冬</option>
        </select>
      </p>
      <p>俳号:<input type="text" id="haigou" /></p>
      <p>俳句:<input type="text" id="haiku" /></p>
      <p>俳句に用いた季語:<input type="text" id="kigo" /></p>
      <p>
        俳句に関する解説(200字以内でお願いします。)<br />
        <textarea id="comments" rows="5" cols="40"></textarea>
      </p>
      <button id="submit-btn">投稿する</button>
    </div>

    <div id="page-list" class="page">
      <h1>投稿された俳句一覧</h1>
      <p>
        題：
        <select id="search-theme">
          <option value="">すべて</option>
          <option>旅</option>
          <option>自然</option>
          <option>家族</option>
          <option>音楽</option>
          <option>食べ物</option>
        </select>
        季節：
        <select id="search-season">
          <option value="">すべて</option>
          <option>春</option>
          <option>夏</option>
          <option>秋</option>
          <option>冬</option>
        </select>
        <button id="search-btn">検索</button>
      </p>
      <hr />
      <ul id="haiku-list-container"></ul>

      <h2>収集された季語</h2>
      <ul id="kigo-list-container"></ul>
    </div>

    <div id="page-detail" class="page">
      <h1>俳句の詳細</h1>
      <div id="detail-content"></div>
      <br />
      <button id="back-to-list-btn">投稿された俳句一覧にもどる</button>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
